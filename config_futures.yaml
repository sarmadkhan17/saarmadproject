bot:
  groq_cache_seconds: 1800
  scan_interval_seconds: 30
  slow_cache_seconds: 7200
dashboard:
  host: 0.0.0.0
  port: 5002
exchange:
  margin_type: ISOLATED
logging:
  backup_count: 5
  max_bytes: 10485760
ml:
  forward_bars: 8
  min_move: 0.002
  min_trades_to_learn: 10
  retrain_hours: 24
  timeframe: 15m
risk:
  leverage: 5
  max_consecutive_losses: 6
  max_daily_loss_pct: 0.03
  max_drawdown_pct: 0.1
  max_open_trades: 10
  max_portfolio_heat: 0.5
  max_position_pct: 0.03
  stop_loss_atr_multiplier: 3.0
  stop_loss_min_pct: 0.01
  take_profit_atr_multiplier: 6.5
  take_profit_pct: 0.03
scanner:
  blacklist:
  - USDC/USDT
  - BUSD/USDT
  - TUSD/USDT
  - FDUSD/USDT
  max_daily_volatility_pct: 15
  min_price: 0.5
  min_volume_usdt: 100000000
  rescan_hours: 4
  top_n: 20
strategy:
  htf_filter_mode: hard
  min_confidence: 0.38
  min_votes: 2
  trading_profile: AGGRESSIVE
training:
  atr_k: 0.45
  history_years: 3
  max_rows: 200000
  min_bars_per_coin: 500
  min_coins: 4
  n_jobs: 8
  primary_timeframe: 15m
  symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - XRP/USDT
  - DOGE/USDT
  - ADA/USDT
  - LINK/USDT
  timeframes:
  - 15m
  - 1h
  - 4h
  - 1d
  use_dataset_pipeline: true
  use_real_api: true
trend_filter:
  enabled: true
  use_two_tier: false       # P3 flag; flip in a separate commit after replay
  # legacy single-tier (unchanged; used when use_two_tier=false)
  tf: 1h
  ema_fast: 50
  ema_slow: 200
  veto_longs: true
  veto_shorts: true
  # two-tier (used when use_two_tier=true)
  fast:
    tf: 15m
    ema_fast: 20
    ema_slow: 50
    slope_lookback: 10
  slow:
    tf: 1h
    ema_fast: 50
    ema_slow: 200
    slope_lookback: 20
  strong_slope_pct: 0.002   # 0.2 %/bar = "strongly opposed"
